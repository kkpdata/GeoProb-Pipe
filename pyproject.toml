[project]
name = "GeoProb-Pipe"
version = "0.0.1"
description = "Execute probabilistic piping calculations using a Deltares probabilic library"
readme = "README.md"
requires-python = ">=3.12"
license = "GPL-3.0-or-later"
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: GNU General Public License v3 (GPLv3)",
    "Programming Language :: Python :: 3.12",
]

dependencies = [
  "geopandas~=1.0.1",
  "matplotlib~=3.10.1",
  "probabilistic-library",
  "scipy~=1.14.1",
]

[tool.black]
line-length = 120
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
)/
'''
[tool.isort]
profile = "black"

[tool.uv.sources]
probabilistic-library = { path = "wheels/probabilistic_library-25.1.1-py3-none-any.whl" }

[dependency-groups]
dev = [
    "pytest>=8.3.5",
    "sphinx>=8.2.3",
    "sphinxcontrib-bibtex>=2.6.3",
]
