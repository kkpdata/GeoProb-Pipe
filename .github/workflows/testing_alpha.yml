name: Automated testing and coverage (in protected branches).

on:
  push:
    branches: [ "alpha" ]
  workflow_dispatch:

jobs:
  test:
    if: "!contains(github.event.head_commit.message, '[auto]')"
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GEOPROB_PIPE_APP_ID }}
          private-key: ${{ secrets.GEOPROB_PIPE_APP_PRIVATE_KEY }}

      - name: Checkout again using app token (for pushing)
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements_testing.txt ]; then pip install -r requirements_testing.txt; fi
          pip install pytest coverage coverage-badge "setuptools<82.0.0"

      - name: Run tests with coverage
        run: |
          coverage run --source=geoprob_pipe -m pytest --ignore=_deprecated/tests
          coverage report -m
          rm -f readme_images/coverage.svg
          coverage-badge -o readme_images/coverage.svg

      - name: Commit & push coverage badge via GitHub App bot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "[auto] Testing and coverage"
            git push https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/${{ github.repository }} HEAD:${{ github.ref_name }}
          else
            echo "No changes to commit"
          fi
