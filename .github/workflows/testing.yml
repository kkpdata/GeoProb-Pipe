name: Automated testing and coverage


on:
  push:
    branches:
      - 'cp_miscellaneous'
  workflow_dispatch:


jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest coverage coverage-badge

      - name: Run tests with coverage
        run: |
          coverage run -m pytest --ignore=tests
          coverage report -m
          if [ -f readme_images/coverage.svg ]; then rm readme_images/coverage.svg; fi
          coverage-badge -o readme_images/coverage.svg
# TODO: Ignoring the tests-directory (for now) because they are not yet built for automated testing.

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add .
          git commit -m "Testing and coverage"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}