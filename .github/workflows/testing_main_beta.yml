name: Automated testing and coverage (in protected branches)


on:
  push:
    branches: [ "main", "beta" ]
  workflow_dispatch:


jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_PUSH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements_testing.txt ]; then pip install -r requirements_testing.txt; fi
          pip install pytest coverage coverage-badge "setuptools<82.0.0"

      - name: Run tests with coverage
        run: |
          coverage run --source=geoprob_pipe -m pytest --ignore=_deprecated/tests
          coverage report -m
